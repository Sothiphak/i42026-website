- name: Deploy Laravel App to Server
  hosts: all
  tasks:
    - name: Ensure deployment directory exists
      ansible.builtin.file:
        path: "/var/www/html/Sothiphak" 
        state: directory
        mode: '0755'

    - name: Copy Laravel files to the server
      ansible.posix.synchronize:
        src: "{{ workspace }}/"
        dest: "/var/www/html/Sothiphak/"
        delete: yes
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=database/database.sqlite"
          - "--exclude=.env"

    - name: Fix ownership for the entire project
      ansible.builtin.file:
        path: "/var/www/html/Sothiphak"
        owner: www-data
        group: www-data
        recurse: yes

    - name: Set secure permissions for storage and cache
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0775'
        recurse: yes
      loop:
        - "/var/www/html/Sothiphak/storage"
        - "/var/www/html/Sothiphak/bootstrap/cache"